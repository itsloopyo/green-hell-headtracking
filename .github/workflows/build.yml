name: Build

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

jobs:
  build:
    name: Build and Validate
    runs-on: windows-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download MelonLoader and create stubs
        shell: pwsh
        run: |
          Write-Host "Setting up build dependencies..." -ForegroundColor Cyan

          $libsPath = "src/GreenHellHeadTracking/libs"
          New-Item -ItemType Directory -Path $libsPath -Force | Out-Null

          # Download MelonLoader
          Write-Host "Downloading MelonLoader..." -ForegroundColor Cyan
          $mlUrl = "https://github.com/LavaGang/MelonLoader/releases/download/v0.6.6/MelonLoader.x64.zip"
          Invoke-WebRequest -Uri $mlUrl -OutFile melonloader.zip -UseBasicParsing
          Expand-Archive -Path melonloader.zip -DestinationPath ml-temp -Force

          if (Test-Path "ml-temp/MelonLoader/net35/MelonLoader.dll") {
            Copy-Item "ml-temp/MelonLoader/net35/MelonLoader.dll" $libsPath/
            Copy-Item "ml-temp/MelonLoader/net35/0Harmony.dll" $libsPath/
            Write-Host "  Copied MelonLoader.dll (net35)" -ForegroundColor Green
            Write-Host "  Copied 0Harmony.dll" -ForegroundColor Green
          } else {
            Write-Host "::error::MelonLoader net35 not found"
            exit 1
          }

          Remove-Item melonloader.zip
          Remove-Item -Recurse ml-temp

          # Create Unity stub assemblies using dotnet build
          Write-Host "Creating Unity stub assemblies..." -ForegroundColor Cyan

          # Build UnityEngine.dll from checked-in UnityStubs.cs
          $projContent = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <LangVersion>11</LangVersion>
              <AssemblyName>UnityEngine</AssemblyName>
              <NoWarn>CS0169;CS0649;CS0067;CS0660;CS0661</NoWarn>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="UnityStubs.cs" />
            </ItemGroup>
          </Project>
          "@
          $projPath = Join-Path $libsPath "Stub_UnityEngine.csproj"
          $projContent | Out-File -FilePath $projPath -Encoding utf8

          dotnet build $projPath -c Release -o $libsPath --nologo -v q
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to build UnityEngine stub"
              exit 1
          }
          Write-Host "  Created UnityEngine.dll" -ForegroundColor Green
          Remove-Item $projPath -ErrorAction SilentlyContinue

          # Build empty stubs for other Unity modules
          $emptySource = "// Empty stub assembly"
          $emptySourcePath = Join-Path $libsPath "EmptyStub.cs"
          $emptySource | Out-File -FilePath $emptySourcePath -Encoding utf8

          $emptyModules = @("UnityEngine.CoreModule", "UnityEngine.InputLegacyModule", "UnityEngine.IMGUIModule", "UnityEngine.PhysicsModule", "UnityEngine.UIModule", "UnityEngine.TextRenderingModule", "UnityEngine.UI", "Assembly-CSharp")
          foreach ($moduleName in $emptyModules) {
              $emptyProjContent = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework>
              <AssemblyName>$moduleName</AssemblyName>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="EmptyStub.cs" />
            </ItemGroup>
          </Project>
          "@
              $emptyProjPath = Join-Path $libsPath "Stub_$moduleName.csproj"
              $emptyProjContent | Out-File -FilePath $emptyProjPath -Encoding utf8

              dotnet build $emptyProjPath -c Release -o $libsPath --nologo -v q
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "::error::Failed to build $moduleName stub"
                  exit 1
              }
              Write-Host "  Created $moduleName.dll" -ForegroundColor Green
              Remove-Item $emptyProjPath -ErrorAction SilentlyContinue
          }

          # Cleanup temp files
          Remove-Item $emptySourcePath -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $libsPath "*.deps.json") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $libsPath "*.pdb") -Force -ErrorAction SilentlyContinue

          Write-Host "Build dependencies ready" -ForegroundColor Green

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $unityPath = "${{ github.workspace }}\src\GreenHellHeadTracking\libs"
          dotnet restore src/GreenHellHeadTracking/GreenHellHeadTracking.csproj "-p:UnityEnginePath=$unityPath"

      - name: Build Debug
        shell: pwsh
        run: |
          Write-Host "Building debug configuration..." -ForegroundColor Cyan
          $unityPath = "${{ github.workspace }}\src\GreenHellHeadTracking\libs"
          dotnet build src/GreenHellHeadTracking/GreenHellHeadTracking.csproj --configuration Debug --no-restore "-p:UnityEnginePath=$unityPath"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Debug build failed"
            exit 1
          }

          Write-Host "Debug build succeeded" -ForegroundColor Green

      - name: Build Release
        shell: pwsh
        run: |
          Write-Host "Building release configuration..." -ForegroundColor Cyan
          $unityPath = "${{ github.workspace }}\src\GreenHellHeadTracking\libs"
          dotnet build src/GreenHellHeadTracking/GreenHellHeadTracking.csproj --configuration Release --no-restore "-p:UnityEnginePath=$unityPath"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Release build failed"
            exit 1
          }

          Write-Host "Release build succeeded" -ForegroundColor Green

      - name: Verify build outputs
        shell: pwsh
        run: |
          Write-Host "Verifying build outputs..." -ForegroundColor Cyan

          $requiredFiles = @(
            "src/GreenHellHeadTracking/bin/Debug/net472/GreenHellHeadTracking.dll",
            "src/GreenHellHeadTracking/bin/Release/net472/GreenHellHeadTracking.dll"
          )

          $allExist = $true
          foreach ($file in $requiredFiles) {
            if (Test-Path $file) {
              $size = (Get-Item $file).Length / 1KB
              Write-Host "  $file ($([math]::Round($size, 2)) KB)" -ForegroundColor Green
            } else {
              Write-Host "  Missing: $file" -ForegroundColor Red
              $allExist = $false
            }
          }

          if (-not $allExist) {
            Write-Host "::error::Some build outputs are missing"
            exit 1
          }

          Write-Host "All build outputs verified" -ForegroundColor Green

      - name: Package installer
        shell: pwsh
        run: |
          Write-Host "Packaging installer ZIP..." -ForegroundColor Cyan
          powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Packaging failed"
            exit 1
          }

          Write-Host "Package created" -ForegroundColor Green

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: GreenHellHeadTracking-installer
          path: release/*-installer.zip
          retention-days: 14
          if-no-files-found: error
